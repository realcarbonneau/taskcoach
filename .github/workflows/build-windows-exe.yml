name: Build Windows Executable (PyInstaller)

# FIXED: pefile 2024.8.26 was causing the hang at "Looking for dynamic libraries"
# Solution: Pin pefile != 2024.8.26 (PyInstaller 6.16 workaround)

on:
  push:
    branches: [ main, master, claude/** ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        # Install Visual C++ redistributables (needed for some Python packages)
        choco install vcredist-all -y

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # CRITICAL FIX: pefile 2024.8.26 causes 60+ minute hang at "Looking for dynamic libraries"
        # See: https://pyinstaller.org/en/latest/CHANGES.html (PyInstaller 6.16)
        pip install "pefile!=2024.8.26"
        # Install PyInstaller 6.16 or later (includes workaround for pefile issue)
        pip install "pyinstaller>=6.16"
        pip install distro
        pip install six>=1.16.0
        pip install desktop3
        pip install pypubsub
        pip install twisted
        pip install chardet>=5.2.0
        pip install python-dateutil>=2.9.0
        pip install pyparsing>=3.1.2
        pip install lxml
        pip install keyring
        pip install numpy
        pip install lockfile>=0.12.2
        pip install gntp>=1.0.3
        pip install WMI>=1.5.1

    - name: Verify pefile and PyInstaller versions
      run: |
        echo "Verifying critical package versions..."
        python -c "import pefile; print('pefile version:', pefile.__version__)"
        python -c "import PyInstaller; print('PyInstaller version:', PyInstaller.__version__)"
        echo "If pefile is 2024.8.26, the hang will occur!"

    - name: Install wxPython
      run: |
        # Install wxPython 4.2.4 or higher (required for Task Coach)
        # See CRITICAL_WXPYTHON_PATCH.md for details on version requirements
        pip install "wxPython>=4.2.4"
      timeout-minutes: 30

    - name: Verify wxPython installation
      run: |
        python -c "import wx; print('wxPython version:', wx.version())"

    - name: Check icon file
      run: |
        if (Test-Path "icons.in/taskcoach.ico") {
          echo "Icon file found"
        } else {
          echo "Icon file not found, checking for PNG"
          if (Test-Path "icons.in/taskcoach.png") {
            echo "PNG icon found"
          }
        }
      shell: pwsh

    - name: Disable Windows Defender (speeds up build significantly)
      run: |
        # Disable real-time monitoring to speed up PyInstaller
        # This is safe in GitHub Actions and dramatically improves build speed
        Set-MpPreference -DisableRealtimeMonitoring $true
      shell: pwsh

    - name: Download Process Monitor (Windows strace equivalent)
      run: |
        # Download SysInternals Process Monitor - traces ALL file/registry/network access
        Invoke-WebRequest -Uri "https://download.sysinternals.com/files/ProcessMonitor.zip" -OutFile procmon.zip
        Expand-Archive procmon.zip -DestinationPath procmon
        echo "Process Monitor downloaded"
      shell: pwsh

    - name: Build executable with PyInstaller + Process Monitor tracing
      run: |
        # Start Process Monitor in background to capture all file access
        # Filter for python.exe to reduce log size
        $procmon = Start-Process -FilePath "procmon\Procmon64.exe" -ArgumentList "/BackingFile","procmon.pml","/Quiet","/Minimized" -PassThru
        echo "Process Monitor started (PID: $($procmon.Id))"

        # Wait for procmon to initialize
        Start-Sleep -Seconds 5

        # Run PyInstaller in background
        echo "Starting PyInstaller build..."
        $process = Start-Process -FilePath "pyinstaller" -ArgumentList "TaskCoach.spec","--clean","--log-level=INFO" -NoNewWindow -PassThru -RedirectStandardOutput "build.log" -RedirectStandardError "build.err"
        echo "PyInstaller started (PID: $($process.Id))"

        # Monitor loop - show what's happening every 30 seconds
        $timeout = 1800  # 30 minutes
        $elapsed = 0
        $interval = 30
        $lastLogSize = 0

        while (-not $process.HasExited -and $elapsed -lt $timeout) {
          Start-Sleep -Seconds $interval
          $elapsed += $interval

          # Show timestamp
          $timestamp = Get-Date -Format "HH:mm:ss"
          echo ""
          echo "[$timestamp] Status: Still running ($elapsed / $timeout seconds)"

          # Show last 3 lines of build log
          if (Test-Path build.log) {
            $currentSize = (Get-Item build.log).Length
            $lastLines = Get-Content build.log -Tail 3
            echo "  Last PyInstaller output:"
            $lastLines | ForEach-Object { echo "    $_" }

            if ($currentSize -eq $lastLogSize) {
              echo "  WARNING: Log file hasn't grown in $interval seconds - might be hung!"
            }
            $lastLogSize = $currentSize
          } else {
            echo "  No build.log found yet"
          }

          # Show CPU usage - if 0%, it's hung
          try {
            $cpuPercent = (Get-Process -Id $process.Id).CPU
            $workingSet = [math]::Round((Get-Process -Id $process.Id).WorkingSet64 / 1MB, 2)
            echo "  CPU time: $cpuPercent seconds | Memory: $workingSet MB"
          } catch {
            echo "  Could not get process stats"
          }
        }

        if ($process.HasExited) {
          echo ""
          echo "PyInstaller completed with exit code: $($process.ExitCode)"
          Stop-Process -Id $procmon.Id -ErrorAction SilentlyContinue
        } else {
          echo ""
          echo "=========================================="
          echo "PyInstaller TIMED OUT after $timeout seconds"
          echo "=========================================="

          echo "Stopping Process Monitor to save trace..."
          Stop-Process -Id $procmon.Id -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3

          echo "Killing PyInstaller process..."
          Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
        }

        # Convert PML to CSV for analysis
        echo "Converting Process Monitor trace to CSV..."
        Start-Process -FilePath "procmon\Procmon64.exe" -ArgumentList "/OpenLog","procmon.pml","/SaveAs","procmon.csv" -Wait -ErrorAction SilentlyContinue

        echo "Process Monitor trace saved"
      shell: pwsh
      timeout-minutes: 35

    - name: Analyze Process Monitor trace
      if: always()
      run: |
        if (Test-Path procmon.csv) {
          echo "=== LAST 100 FILE OPERATIONS BEFORE HANG ==="
          # Show last 100 operations - reveals exactly which file caused hang
          Get-Content procmon.csv -Tail 100 | Select-String -Pattern "python.exe|pyinstaller"
        } else {
          echo "No Process Monitor trace found"
        }

        if (Test-Path build.log) {
          echo "=== LAST 50 LINES OF PYINSTALLER OUTPUT ==="
          Get-Content build.log -Tail 50
        }
      shell: pwsh

    - name: List build output
      run: |
        echo "Contents of dist directory:"
        Get-ChildItem -Path dist -Recurse | Select-Object FullName
      shell: pwsh

    - name: Test executable (basic check)
      run: |
        if (Test-Path "dist/TaskCoach/TaskCoach.exe") {
          echo "Executable created successfully"
          # Get file size
          $file = Get-Item "dist/TaskCoach/TaskCoach.exe"
          echo "Executable size: $($file.Length) bytes"
        } else {
          echo "ERROR: Executable not found!"
          exit 1
        }
      shell: pwsh

    - name: Create distribution archive
      run: |
        Compress-Archive -Path dist/TaskCoach/* -DestinationPath TaskCoach-Windows.zip
      shell: pwsh

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: TaskCoach-Windows-Executable
        path: |
          dist/TaskCoach/
          TaskCoach-Windows.zip
        retention-days: 30

    - name: Upload Process Monitor trace (shows exact file causing hang)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: process-monitor-trace
        path: |
          procmon.csv
          procmon.pml
          build.log
          build.err
        retention-days: 7

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/
          *.log
        retention-days: 7
