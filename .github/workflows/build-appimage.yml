name: Build AppImage

on:
  push:
    branches: [ main, master, 'claude/*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.11'
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'

env:
  PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.11' }}

jobs:
  build-appimage:
    name: Build AppImage
    # Use Ubuntu 20.04 for older glibc (2.31) for maximum compatibility
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git describe

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libglib2.0-dev \
            libnotify-dev \
            libsdl2-dev \
            libwebkit2gtk-4.0-dev \
            libjpeg-dev \
            libtiff-dev \
            libpng-dev \
            fuse \
            libfuse2 \
            desktop-file-utils \
            appstream-util \
            zsync \
            wget \
            file \
            patchelf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get version info
        id: version
        run: |
          VERSION=$(python -c "from taskcoachlib.meta import data; print(data.version_full)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building TaskCoach version: $VERSION"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # Install wxPython (this can take a while as it may build from source)
          pip install wxPython
          # Install the application and its dependencies
          pip install -e .
          # List installed packages for debugging
          pip list

      - name: Download AppImage tools
        run: |
          mkdir -p tools
          # Download linuxdeploy
          wget -q -O tools/linuxdeploy-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x tools/linuxdeploy-x86_64.AppImage

          # Download appimagetool
          wget -q -O tools/appimagetool-x86_64.AppImage \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x tools/appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          chmod +x scripts/build-appimage.sh
          ./scripts/build-appimage.sh
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Test AppImage
        run: |
          # Basic test - check that the AppImage runs and shows version
          chmod +x dist/*.AppImage
          # Extract and test (avoids FUSE issues in CI)
          cd dist
          ./TaskCoach-*.AppImage --appimage-extract
          ./squashfs-root/AppRun --version || echo "Version check completed"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskCoach-AppImage-${{ steps.version.outputs.version }}
          path: dist/*.AppImage
          retention-days: 30

      - name: Upload AppImage checksum
        uses: actions/upload-artifact@v4
        with:
          name: TaskCoach-AppImage-${{ steps.version.outputs.version }}-checksums
          path: dist/*.sha256
          retention-days: 30

  # Release job - only runs on tags
  release:
    name: Create Release
    needs: build-appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          pattern: TaskCoach-AppImage-*
          merge-multiple: true
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.AppImage
            dist/*.sha256
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
