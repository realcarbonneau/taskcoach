name: Build Linux Executables

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-pyinstaller:
    name: Build PyInstaller Executable
    runs-on: ubuntu-22.04  # Use 22.04 for better GLIBC compatibility (2.35 vs 2.38+)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libnotify-dev \
            libsdl2-dev \
            libjpeg-dev \
            libtiff-dev \
            libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller distro

      - name: Install TaskCoach dependencies
        run: |
          python -m pip install \
            six>=1.16.0 \
            desktop3 \
            pypubsub \
            twisted \
            chardet>=5.2.0 \
            python-dateutil>=2.9.0 \
            pyparsing>=3.1.2 \
            lxml \
            pyxdg \
            keyring \
            numpy \
            lockfile>=0.12.2 \
            gntp>=1.0.3

      - name: Install wxPython
        run: |
          # Use pre-built wheels from extras repository (much faster than building from source)
          echo "Installing wxPython from extras repository..."
          python -m pip install -U -f https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04 wxPython || {
            echo "Failed to install from extras repository, trying PyPI..."
            python -m pip install wxPython>=4.2.4
          }

      - name: Verify wxPython installation
        run: |
          python -c "import wx; print(f'wxPython version: {wx.version()}')"

      - name: Build with PyInstaller
        run: |
          pyinstaller taskcoach.spec

      - name: Create tarball
        run: |
          VERSION=$(python -c "from taskcoachlib import meta; print(meta.version)")
          ARCH=$(uname -m)
          UBUNTU_VERSION="ubuntu22.04"
          cd dist
          tar czf "TaskCoach-${VERSION}-${ARCH}-${UBUNTU_VERSION}-pyinstaller.tar.gz" taskcoach/
          cd ..
          echo "TARBALL_NAME=TaskCoach-${VERSION}-${ARCH}-${UBUNTU_VERSION}-pyinstaller.tar.gz" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "UBUNTU_VERSION=${UBUNTU_VERSION}" >> $GITHUB_ENV

      - name: Test executable
        run: |
          # Test that the executable exists and is executable
          test -f dist/taskcoach/taskcoach
          test -x dist/taskcoach/taskcoach
          # Try to run with --help (will fail without DISPLAY, but should show it tried)
          dist/taskcoach/taskcoach --help || echo "Expected to fail without DISPLAY"

      - name: Upload PyInstaller artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskcoach-${{ env.VERSION }}-${{ env.UBUNTU_VERSION }}-pyinstaller-tarball
          path: dist/${{ env.TARBALL_NAME }}
          retention-days: 90

      - name: Upload executable directory (for testing)
        uses: actions/upload-artifact@v4
        with:
          name: taskcoach-${{ env.VERSION }}-${{ env.UBUNTU_VERSION }}-pyinstaller-dir
          path: dist/taskcoach/
          retention-days: 30

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04  # Use 22.04 for better GLIBC compatibility (2.35 vs 2.38+)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libnotify-dev \
            libsdl2-dev \
            libjpeg-dev \
            libtiff-dev \
            libpng-dev \
            fuse \
            file \
            wget

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel distro

      - name: Get version
        id: get_version
        run: |
          VERSION=$(python -c "from taskcoachlib import meta; print(meta.version)")
          UBUNTU_VERSION="ubuntu22.04"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "UBUNTU_VERSION=${UBUNTU_VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          UBUNTU_VERSION=${{ env.UBUNTU_VERSION }} ./build-appimage.sh

      - name: List AppImage
        run: |
          ls -lh TaskCoach-*.AppImage
          ARCH=$(uname -m)
          echo "APPIMAGE_NAME=TaskCoach-${VERSION}-${ARCH}-${UBUNTU_VERSION}.AppImage" >> $GITHUB_ENV

      - name: Test AppImage
        run: |
          # Test that the AppImage exists and is executable
          test -f "$APPIMAGE_NAME"
          test -x "$APPIMAGE_NAME"
          # Extract and verify structure
          ./"$APPIMAGE_NAME" --appimage-extract
          test -f squashfs-root/AppRun
          test -f squashfs-root/taskcoach.desktop

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: taskcoach-appimage-${{ env.VERSION }}
          path: TaskCoach-*.AppImage
          retention-days: 90

  create-release:
    name: Create Release
    needs: [build-pyinstaller, build-appimage]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(python -c "from taskcoachlib import meta; print(meta.version)")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/taskcoach-pyinstaller-linux-${{ env.VERSION }}/*.tar.gz
            artifacts/taskcoach-appimage-${{ env.VERSION }}/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
