name: Build Linux Executable

on:
  # Trigger on pushes to main branch and release tags
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

  # Allow manual triggering
  workflow_dispatch:

  # Trigger on pull requests for testing
  pull_request:
    branches:
      - main
      - master

jobs:
  build-linux:
    name: Build Linux Executable with PyInstaller
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone for faster checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libsdl2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libwebkit2gtk-4.0-dev \
            freeglut3-dev \
            libsm-dev \
            libxtst-dev \
            libxxf86vm-dev \
            libxss1 \
            patchelf \
            upx-ucl

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel

          # Install wxPython from wheel (much faster than building from source)
          pip install -U \
            -f https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04 \
            wxPython

          # Install PyInstaller
          pip install pyinstaller

          # Install project dependencies
          pip install -e .

      - name: Build with PyInstaller
        run: |
          # Run PyInstaller with the spec file
          pyinstaller taskcoach-linux.spec

          # Verify the build
          ls -lh dist/taskcoach/

      - name: Create archive
        run: |
          cd dist
          tar -czf taskcoach-linux-x86_64.tar.gz taskcoach/
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskcoach-linux-x86_64
          path: dist/taskcoach-linux-x86_64.tar.gz
          retention-days: 30

      - name: Upload to release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/taskcoach-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## Build Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **OS**: Ubuntu 22.04" >> $GITHUB_STEP_SUMMARY
          echo "- **Python**: $(python --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **PyInstaller**: $(pyinstaller --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Archive size: $(du -h dist/taskcoach-linux-x86_64.tar.gz | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- Executable location: \`dist/taskcoach/taskcoach\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "tar -xzf taskcoach-linux-x86_64.tar.gz" >> $GITHUB_STEP_SUMMARY
          echo "cd taskcoach" >> $GITHUB_STEP_SUMMARY
          echo "./taskcoach" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
