name: Build Linux Executable with PyInstaller

on:
  push:
    branches:
      - main
      - claude/*
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies and Python packages
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-wxgtk4.0 \
          libgtk-3-dev \
          xvfb \
          libnotify4 \
          libwebpdemux2 \
          libraqm0

    - name: Verify Python and wxPython availability
      run: |
        echo "=== Python Version Detection ==="
        echo "Default python3: $(which python3)"
        python3 --version

        echo ""
        echo "=== Checking for python3.10, 3.11, 3.12 ==="
        for py_ver in 3.10 3.11 3.12; do
          if command -v python${py_ver} &> /dev/null; then
            echo "✓ python${py_ver} available: $(python${py_ver} --version)"
            if xvfb-run -a python${py_ver} -c "import wx; print('  wxPython:', wx.__version__)" 2>/dev/null; then
              echo "  ✓ wxPython accessible"
              PYTHON_CMD="python${py_ver}"
            else
              echo "  ✗ wxPython not accessible"
            fi
          fi
        done

        echo ""
        echo "=== Selected Python: ${PYTHON_CMD} ==="
        echo "PYTHON_CMD=${PYTHON_CMD}" >> $GITHUB_ENV
        ${PYTHON_CMD} --version
        xvfb-run -a ${PYTHON_CMD} check_wxpython.py

    - name: Install Python dependencies
      run: |
        # Upgrade pip first
        $PYTHON_CMD -m pip install --user --upgrade pip
        # Use --break-system-packages if available (pip 22.1+), otherwise --user
        $PYTHON_CMD -m pip install --break-system-packages \
          pyinstaller pypubsub desktop3 pyxdg distro lockfile gntp \
          chardet python-dateutil pyparsing lxml keyring numpy six twisted \
          2>/dev/null || \
        $PYTHON_CMD -m pip install --user \
          pyinstaller pypubsub desktop3 pyxdg distro lockfile gntp \
          chardet python-dateutil pyparsing lxml keyring numpy six twisted

        # Verify optional dependencies installed
        echo "Verifying optional dependencies..."
        $PYTHON_CMD -c "import desktop; print('✓ desktop3')" || echo "⚠ desktop3 not found (file open may be limited)"
        $PYTHON_CMD -c "from xdg import BaseDirectory; print('✓ pyxdg')" || echo "⚠ pyxdg not found (config dirs will use fallback)"
        $PYTHON_CMD -c "import distro; print('✓ distro')" || echo "⚠ distro not found (distro detection disabled)"

    - name: Build with PyInstaller
      run: |
        $PYTHON_CMD -m PyInstaller taskcoach.spec

    - name: Verify build warnings
      run: |
        echo "=== Checking for critical build errors ==="
        if grep -q "ERROR: Hidden import 'wx" build/taskcoach/warn-taskcoach.txt; then
          echo "❌ CRITICAL: wxPython modules not found during build!"
          echo "The executable will not work without wxPython."
          echo ""
          echo "Errors found:"
          grep "ERROR: Hidden import 'wx" build/taskcoach/warn-taskcoach.txt | head -20
          echo ""
          echo "This means the Python environment used by PyInstaller cannot access wxPython."
          echo "Check that python3-wxgtk4.0 is installed and accessible to system python3."
          exit 1
        else
          echo "✓ No critical wxPython import errors found"
        fi

    - name: Test executable
      run: |
        echo "=== Testing executable ==="
        if ! xvfb-run -a ./dist/taskcoach --version; then
          echo "❌ Executable failed to run!"
          exit 1
        fi
        echo "✓ Executable runs successfully"

    - name: Get version and create artifact name
      id: version
      run: |
        VERSION=$(xvfb-run -a ./dist/taskcoach --version 2>&1 | grep -oP 'Task Coach \K[0-9.]+' || echo "unknown")
        GLIBC=$(ldd --version | head -1 | awk '{print $NF}')
        FILENAME="taskcoach-${VERSION}-ubuntu22.04-glibc${GLIBC}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
        echo "TaskCoach version: ${VERSION}"
        echo "GLIBC version: ${GLIBC}"
        echo "Final filename: ${FILENAME}"
        mv dist/taskcoach "dist/${FILENAME}"

    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.version.outputs.filename }}
        path: dist/${{ steps.version.outputs.filename }}
        retention-days: 30

    - name: Create build info
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        FILENAME="${{ steps.version.outputs.filename }}"
        GLIBC=$(ldd --version | head -1 | awk '{print $NF}')
        {
          echo "Build Information"
          echo "================="
          echo "Build Date: $(date)"
          echo "TaskCoach Version: ${VERSION}"
          echo "Build Variant: Ubuntu 22.04 (Recommended)"
          echo "Python: ${PYTHON_CMD} ($(${PYTHON_CMD} --version))"
          echo "PyInstaller: $(${PYTHON_CMD} -m PyInstaller --version)"
          echo "wxPython: $(xvfb-run -a ${PYTHON_CMD} -c 'import wx; print(wx.__version__)')"
          echo "Platform: $(uname -a)"
          echo "GLIBC: ${GLIBC}"
          echo ""
          echo "Compatibility"
          echo "============="
          echo "✅ Ubuntu 22.04+ (GLIBC 2.35+)"
          echo "✅ Ubuntu 23.04+ (GLIBC 2.37+)"
          echo "✅ Ubuntu 24.04+ (GLIBC 2.38+)"
          echo "✅ Debian 12+ (Bookworm)"
          echo "✅ Fedora 36+"
          echo "✅ Most 2022+ Linux distributions"
          echo ""
          echo "File Information"
          echo "================"
          ls -lh dist/${FILENAME}
        } > dist/BUILD_INFO.txt
        cat dist/BUILD_INFO.txt

    - name: Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.version.outputs.filename }}-info
        path: dist/BUILD_INFO.txt
        retention-days: 30
