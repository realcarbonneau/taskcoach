name: Build Linux Executable with PyInstaller

on:
  push:
    branches:
      - main
      - claude/*
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies and Python packages
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-wxgtk4.0 \
          libgtk-3-dev \
          xvfb \
          libnotify4 \
          libwebpdemux2 \
          libraqm0

    - name: Verify Python and wxPython availability
      run: |
        echo "=== Python Version Detection ==="
        echo "Default python3: $(which python3)"
        python3 --version

        echo ""
        echo "=== Checking for python3.10, 3.11, 3.12 ==="
        for py_ver in 3.10 3.11 3.12; do
          if command -v python${py_ver} &> /dev/null; then
            echo "✓ python${py_ver} available: $(python${py_ver} --version)"
            if xvfb-run -a python${py_ver} -c "import wx; print('  wxPython:', wx.__version__)" 2>/dev/null; then
              echo "  ✓ wxPython accessible"
              PYTHON_CMD="python${py_ver}"
            else
              echo "  ✗ wxPython not accessible"
            fi
          fi
        done

        echo ""
        echo "=== Selected Python: ${PYTHON_CMD} ==="
        echo "PYTHON_CMD=${PYTHON_CMD}" >> $GITHUB_ENV
        ${PYTHON_CMD} --version
        xvfb-run -a ${PYTHON_CMD} check_wxpython.py

    - name: Install Python dependencies
      run: |
        $PYTHON_CMD -m pip install --break-system-packages --upgrade pip
        $PYTHON_CMD -m pip install --break-system-packages \
          pyinstaller \
          pypubsub \
          desktop3 \
          pyxdg \
          distro \
          lockfile \
          gntp \
          chardet \
          python-dateutil \
          pyparsing \
          lxml \
          keyring \
          numpy \
          six \
          twisted

    - name: Build with PyInstaller
      run: |
        $PYTHON_CMD -m PyInstaller taskcoach.spec

    - name: Verify build warnings
      run: |
        echo "=== Checking for critical build errors ==="
        if grep -q "ERROR: Hidden import 'wx" build/taskcoach/warn-taskcoach.txt; then
          echo "❌ CRITICAL: wxPython modules not found during build!"
          echo "The executable will not work without wxPython."
          echo ""
          echo "Errors found:"
          grep "ERROR: Hidden import 'wx" build/taskcoach/warn-taskcoach.txt | head -20
          echo ""
          echo "This means the Python environment used by PyInstaller cannot access wxPython."
          echo "Check that python3-wxgtk4.0 is installed and accessible to system python3."
          exit 1
        else
          echo "✓ No critical wxPython import errors found"
        fi

    - name: Test executable
      run: |
        echo "=== Testing executable ==="
        if ! xvfb-run -a ./dist/taskcoach --version; then
          echo "❌ Executable failed to run!"
          exit 1
        fi
        echo "✓ Executable runs successfully"

    - name: Get version
      id: get_version
      run: |
        VERSION=$(xvfb-run -a ./dist/taskcoach --version 2>&1 | grep -oP 'Task Coach \K[0-9.]+' || echo "unknown")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "TaskCoach version: $VERSION"

    - name: Prepare artifact name
      id: artifact_name
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        ARTIFACT_NAME="taskcoach-linux-x86_64-${TIMESTAMP}"
        echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
        echo "Artifact name: $ARTIFACT_NAME"

    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact_name.outputs.name }}
        path: dist/taskcoach
        retention-days: 30

    - name: Create build info
      run: |
        echo "Build Information" > dist/BUILD_INFO.txt
        echo "=================" >> dist/BUILD_INFO.txt
        echo "Build Date: $(date)" >> dist/BUILD_INFO.txt
        echo "TaskCoach Version: ${{ steps.get_version.outputs.version }}" >> dist/BUILD_INFO.txt
        echo "Python Command: ${PYTHON_CMD}" >> dist/BUILD_INFO.txt
        echo "Python Version: $(${PYTHON_CMD} --version)" >> dist/BUILD_INFO.txt
        echo "PyInstaller Version: $(${PYTHON_CMD} -m PyInstaller --version)" >> dist/BUILD_INFO.txt
        echo "wxPython Version: $(xvfb-run -a ${PYTHON_CMD} -c 'import wx; print(wx.__version__)')" >> dist/BUILD_INFO.txt
        echo "Platform: $(uname -a)" >> dist/BUILD_INFO.txt
        echo "GLIBC Version: $(ldd --version | head -1)" >> dist/BUILD_INFO.txt
        echo "" >> dist/BUILD_INFO.txt
        echo "File Information:" >> dist/BUILD_INFO.txt
        ls -lh dist/taskcoach >> dist/BUILD_INFO.txt
        echo "" >> dist/BUILD_INFO.txt
        echo "Shared Library Dependencies:" >> dist/BUILD_INFO.txt
        ldd dist/taskcoach | grep -E "(libc|libpython)" >> dist/BUILD_INFO.txt || true
        cat dist/BUILD_INFO.txt

    - name: Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact_name.outputs.name }}-info
        path: dist/BUILD_INFO.txt
        retention-days: 30
