name: Build Linux Executable with PyInstaller

on:
  push:
    branches:
      - claude/pyinstaller-windows-build-*
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Display Python version
        run: |
          python --version
          pip --version

      - name: Install system dependencies for wxPython build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libnotify-dev \
            libsdl2-dev \
            libjpeg-dev \
            libtiff-dev \
            libpng-dev \
            freeglut3-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libwebkit2gtk-4.0-dev \
            libxtst-dev

      - name: Install wxPython 4.2.4+ (build from source)
        run: |
          echo "Installing wxPython 4.2.4 or later from source..."
          echo "This may take 20-30 minutes..."
          pip install -v "wxPython>=4.2.4"
          python -c "import wx; print(f'wxPython version: {wx.version()}')"
        timeout-minutes: 45

      - name: Install PyInstaller
        run: |
          echo "Installing PyInstaller..."
          pip install pyinstaller
          pyinstaller --version

      - name: Install project dependencies
        run: |
          echo "Installing TaskCoach dependencies..."
          pip install six>=1.16.0
          pip install desktop3
          pip install pypubsub
          pip install twisted
          pip install chardet>=5.2.0
          pip install python-dateutil>=2.9.0
          pip install pyparsing>=3.1.2
          pip install lxml
          pip install keyring
          pip install numpy
          pip install lockfile>=0.12.2
          pip install gntp>=1.0.3
          pip install distro

      - name: List installed packages
        run: |
          pip list

      - name: Verify critical imports
        run: |
          python -c "import wx; print('wx OK')"
          python -c "import twisted; print('twisted OK')"
          python -c "import lxml; print('lxml OK')"
          python -c "import numpy; print('numpy OK')"

      - name: Generate templates
        run: |
          if [ -f "templates.in/make.py" ]; then
            echo "Generating templates..."
            cd templates.in
            python make.py
            cd ..
          fi

      - name: Generate icons
        run: |
          if [ -f "icons.in/make.py" ]; then
            echo "Generating icons..."
            cd icons.in
            python make.py
            cd ..
          fi
        continue-on-error: true

      - name: Build with PyInstaller (TRACE logging for debugging)
        run: |
          echo "============================================"
          echo "Building TaskCoach with PyInstaller"
          echo "Using TRACE logging to debug hanging issue"
          echo "============================================"

          export PYTHONUNBUFFERED=1

          pyinstaller --log-level=TRACE --clean TaskCoach.spec 2>&1 | tee pyinstaller_trace.log

          echo "============================================"
          echo "PyInstaller completed!"
          echo "============================================"
        timeout-minutes: 60

      - name: Upload PyInstaller trace log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-trace-log-linux
          path: pyinstaller_trace.log
          retention-days: 7

      - name: Check build output
        if: always()
        run: |
          echo "Checking build directories..."
          if [ -d "dist/TaskCoach" ]; then
            echo "dist/TaskCoach exists!"
            find dist/TaskCoach -type f -exec ls -lh {} \; | head -50
          else
            echo "WARNING: dist/TaskCoach not found!"
          fi

          if [ -d "build" ]; then
            echo "Build directory contents:"
            find build -maxdepth 2 -type f | head -20
          fi

      - name: Test executable (if built successfully)
        if: success()
        run: |
          if [ -f "dist/TaskCoach/TaskCoach" ]; then
            echo "Testing TaskCoach executable with --help..."
            ./dist/TaskCoach/TaskCoach --help || true

            echo "Testing TaskCoach executable with --version..."
            ./dist/TaskCoach/TaskCoach --version || true
          else
            echo "TaskCoach executable not found, skipping test"
          fi
        timeout-minutes: 5
        continue-on-error: true

      - name: Package executable
        if: success()
        run: |
          if [ -d "dist/TaskCoach" ]; then
            echo "Creating tar.gz archive..."
            cd dist
            tar -czf TaskCoach-Linux-x64.tar.gz TaskCoach/
            cd ..
            mv dist/TaskCoach-Linux-x64.tar.gz .

            echo "Archive created:"
            ls -lh TaskCoach-Linux-x64.tar.gz
          fi

      - name: Upload Linux executable
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TaskCoach-Linux-x64
          path: TaskCoach-Linux-x64.tar.gz
          retention-days: 30

      - name: Upload build directory for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-files-linux
          path: |
            build/
            *.log
          retention-days: 7
